<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My GitHub Pages</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      padding: 40px;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 16px;
      font-size: 28px;
    }

    p {
      margin-bottom: 20px;
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello GitHub Pages</h1>
    <p>你的静态网站已成功运行 🚀</p>
    <a class="btn" href="#">进入主页</a>
  </div>
</body>
</html>
